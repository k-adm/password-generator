<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <style>
      /* The whole page follows the theme next-themes applies to <html>
         (.light / .dark), so choosing Light on a dark OS (or Dark on a light OS)
         paints the full page. Before React mounts (no theme class yet) we fall
         back to the OS scheme so the default "system" theme shows no flash. */
      html {
        color-scheme: light dark;
      }
      html,
      body {
        width: 380px;
        margin: 0;
        background: oklch(1 0 0);
      }
      html.dark,
      html.dark body {
        background: oklch(0.145 0 0);
      }
      @media (prefers-color-scheme: dark) {
        html:not(.light):not(.dark),
        html:not(.light):not(.dark) body {
          background: oklch(0.145 0 0);
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/popup/main.jsx"></script>
  </body>
</html>
